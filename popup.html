<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Screenshot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #272727;
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f1f1f1;
    }

    #preview-wrap {
      position: relative;
      background: #1a1a1a;
      border-bottom: 1px solid #272727;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #preview {
      display: block;
      max-width: 100%;
      max-height: 200px;
      object-fit: contain;
    }

    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 28px;
      color: #717171;
      font-size: 13px;
    }

    #timestamp-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      display: none;
    }

    .controls {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
    }

    select {
      flex: 1;
      background: #272727;
      color: #f1f1f1;
      border: 1px solid #3f3f3f;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    select:focus { border-color: #ff0000; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-capture {
      grid-column: 1 / -1;
      background: #ff0000;
      color: #fff;
      font-size: 14px;
      padding: 11px;
    }

    #btn-capture:hover:not(:disabled) { background: #cc0000; }

    #btn-copy {
      background: #272727;
      color: #f1f1f1;
      border: 1px solid #3f3f3f;
    }

    #btn-copy:hover:not(:disabled) { background: #333; }

    #btn-download {
      background: #272727;
      color: #f1f1f1;
      border: 1px solid #3f3f3f;
    }

    #btn-download:hover:not(:disabled) { background: #333; }

    #status {
      font-size: 11px;
      text-align: center;
      min-height: 16px;
      color: #aaa;
      padding: 0 16px 10px;
    }

    #status.error { color: #ff4444; }
    #status.success { color: #44bb44; }
  </style>
</head>
<body>
  <header>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <rect width="24" height="24" rx="5" fill="#FF0000"/>
      <polygon points="10,8 16,12 10,16" fill="white"/>
    </svg>
    <h1>YouTube Screenshot Capture</h1>
  </header>

  <div id="preview-wrap">
    <div id="placeholder">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span>Open a YouTube video, then capture</span>
    </div>
    <img id="preview" style="display:none" alt="Preview" />
    <span id="timestamp-badge"></span>
  </div>

  <div class="controls">
    <div class="row">
      <label for="format">Format</label>
      <select id="format">
        <option value="png">PNG (lossless)</option>
        <option value="jpeg">JPEG (smaller file)</option>
      </select>
      <label for="quality" id="quality-label" style="display:none">Quality</label>
      <select id="quality" style="display:none">
        <option value="0.95">High (95%)</option>
        <option value="0.85">Medium (85%)</option>
        <option value="0.70">Low (70%)</option>
      </select>
    </div>

    <button id="btn-capture">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M9 3H5a2 2 0 00-2 2v4m0 6v4a2 2 0 002 2h4m6 0h4a2 2 0 002-2v-4m0-6V5a2 2 0 00-2-2h-4"/>
      </svg>
      Capture Frame
    </button>

    <div class="btn-row">
      <button id="btn-copy" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        Copy
      </button>
      <button id="btn-download" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download
      </button>
    </div>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
